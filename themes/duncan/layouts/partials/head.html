<head>
  <meta
    name="description"
    content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Summary }}{{ end }}"
  />
  {{ if isset .Params "tags" }}<meta name="keywords" content="{{ with
  .Params.tags }}{{ delimit . ", " }}{{ end }}"> {{ end -}}
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="index, follow" />
  <meta charset="utf-8" />
  <title>
    {{ if not .IsHome }}{{ .Title | title }} &ndash; {{ end }}{{ .Site.Title }}
  </title>
  <link rel="canonical" href="{{ .Site.BaseURL }}" />
  <link
    rel="alternate"
    type="application/rss+xml"
    title="{{ .Site.Title }} RSS"
    href="/index.xml"
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
	href="https://fonts.googleapis.com/css2?family=Lato:wght@300;700&display=swap"
	rel="stylesheet"
	>
  {{ with .Site.Params.favicon }}
  <link rel="icon" href="{{ . }}" />
  {{ end -}}
  <link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
	crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="/css/style.css" />
</head>
